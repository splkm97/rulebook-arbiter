<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minesweeper Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Classic Logic Puzzle</p>
          <h1>Minesweeper</h1>
        </div>
        <button id="new-game-button" class="button button-primary" type="button">New game</button>
      </header>

      <section class="controls-panel" aria-label="Game controls">
        <label class="field">
          <span>Difficulty</span>
          <select id="preset-select">
            <option value="beginner">Beginner (9 x 9, 10 mines)</option>
            <option value="intermediate">Intermediate (16 x 16, 40 mines)</option>
            <option value="expert">Expert (16 x 30, 99 mines)</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <div id="custom-config" class="custom-config" hidden>
          <label class="field field-compact">
            <span>Rows</span>
            <input id="rows-input" type="number" min="6" max="30" step="1" value="12" />
          </label>
          <label class="field field-compact">
            <span>Columns</span>
            <input id="cols-input" type="number" min="6" max="40" step="1" value="20" />
          </label>
          <label class="field field-compact">
            <span>Mines</span>
            <input id="mines-input" type="number" min="1" max="799" step="1" value="45" />
          </label>
          <button id="apply-custom-button" class="button button-secondary" type="button">Apply custom</button>
        </div>
      </section>

      <section class="hud-panel" aria-label="Game status">
        <article class="stat-card">
          <span>State</span>
          <strong id="state-value">Ready</strong>
        </article>
        <article class="stat-card">
          <span>Mines left</span>
          <strong id="mines-value">10</strong>
        </article>
        <article class="stat-card">
          <span>Time</span>
          <strong id="timer-value">000</strong>
        </article>
        <button id="tap-mode-button" class="button button-ghost" type="button" hidden>
          Tap mode: reveal
        </button>
      </section>

      <section id="board-section" class="board-section" aria-label="Minesweeper board">
        <div id="board" class="board" role="grid" aria-live="polite"></div>
      </section>

      <p id="hint-text" class="hint-text">
        Left click to reveal, right click to flag, and double click revealed numbers to chord open nearby cells.
      </p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
